<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <div id="controls">
    <!-- Row 1: Media tabs, size filter, rescan -->
    <div class="row tab-row">
      <div id="mediaTabs" class="media-tabs" role="tablist" aria-label="Media type">
        <button id="imageTab" class="media-tab active" type="button" role="tab" aria-selected="true" data-media-tab="image">
          Images <span id="imageCountBadge" class="count-badge">0</span>
        </button>
        <button id="videoTab" class="media-tab" type="button" role="tab" aria-selected="false" data-media-tab="video">
          Videos <span id="videoCountBadge" class="count-badge">0</span>
        </button>
      </div>
      <div class="flex-group">
        <label>Min:</label>
        <input type="number" id="minWidth" value="50"><span>x</span><input type="number" id="minHeight" value="50">
        <button id="rescanBtn" class="btn-outline btn-icon" title="Rescan page for new media">&#8635;</button>
      </div>
    </div>

    <!-- Row 2: Type filters -->
    <div class="row filter-row">
      <div class="flex-group type-filter-group" data-filter-group="image">
        <label class="type-check"><input class="media-type-filter" type="checkbox" checked value="jpg" data-media-type="image"> JPG</label>
        <label class="type-check"><input class="media-type-filter" type="checkbox" checked value="png" data-media-type="image"> PNG</label>
        <label class="type-check"><input class="media-type-filter" type="checkbox" checked value="webp" data-media-type="image"> WebP</label>
        <label class="type-check"><input class="media-type-filter" type="checkbox" checked value="svg" data-media-type="image"> SVG</label>
        <label class="type-check"><input class="media-type-filter" type="checkbox" checked value="gif" data-media-type="image"> GIF</label>
        <label class="type-check"><input class="media-type-filter" type="checkbox" checked value="avif" data-media-type="image"> AVIF</label>
        <label class="type-check"><input class="media-type-filter" type="checkbox" checked value="bmp" data-media-type="image"> BMP</label>
        <label class="type-check"><input class="media-type-filter" type="checkbox" checked value="ico" data-media-type="image"> ICO</label>
      </div>
      <div class="flex-group type-filter-group hidden" data-filter-group="video">
        <label class="type-check"><input class="media-type-filter" type="checkbox" checked value="mp4" data-media-type="video"> MP4</label>
        <label class="type-check"><input class="media-type-filter" type="checkbox" checked value="webm" data-media-type="video"> WebM</label>
        <label class="type-check"><input class="media-type-filter" type="checkbox" checked value="mov" data-media-type="video"> MOV</label>
        <label class="type-check"><input class="media-type-filter" type="checkbox" checked value="m4v" data-media-type="video"> M4V</label>
        <label class="type-check"><input class="media-type-filter" type="checkbox" checked value="ogv" data-media-type="video"> OGV</label>
        <label class="type-check"><input class="media-type-filter" type="checkbox" checked value="m3u8" data-media-type="video"> HLS</label>
        <label class="type-check"><input class="media-type-filter" type="checkbox" checked value="mpd" data-media-type="video"> DASH</label>
      </div>
      <div id="imageDownloadOptions" class="flex-group image-only-options">
        <label class="type-check" style="color:#d63384; font-weight:700;"><input type="checkbox" id="convertWebp"> WebP2</label>
        <select id="convertWebpFormat" title="Target format for WebP conversion">
          <option value="png">PNG</option>
          <option value="jpeg">JPG</option>
        </select>
      </div>
    </div>

    <!-- Row 3: Search, Folder, Rename -->
    <div class="row">
      <div class="input-wrapper" style="flex: 2;">
        <label>Filter:</label>
        <input type="text" id="filterText" placeholder="Name or Alt text...">
      </div>
      <div class="input-wrapper">
        <label>Folder:</label>
        <input type="text" id="subfolderName" placeholder="Subfolder">
      </div>
      <div class="input-wrapper">
        <label>Rename:</label>
        <input type="text" id="renamePattern" placeholder="Prefix">
      </div>
    </div>

    <!-- Row 4: Actions -->
    <div class="row" style="margin-top: 10px; border-top: 1px solid #eee; padding-top: 8px;">
      <div id="status">Scanning...</div>
      <div class="flex-group">
        <label title="Grid columns" aria-label="Grid columns"><input type="range" id="gridSlider" min="3" max="8" value="5" aria-label="Grid columns"></label>
        <label class="type-check" style="color:#6f42c1; font-weight:700;" title="Download all selected as a single ZIP file">
          <input type="checkbox" id="zipMode"> ZIP
        </label>
        <label id="editorExportOption" class="type-check image-only-options" title="Export format for edited images">
          <select id="exportFormat">
            <option value="png">PNG</option>
            <option value="jpeg">JPG</option>
            <option value="webp">WebP</option>
          </select>
        </label>
        <button id="selectAllBtn" class="btn-primary" title="Select/Deselect all visible images (Ctrl+A)">Select All</button>
        <button id="downloadBtn" class="btn-success" disabled title="Download selected images (Ctrl+D)">Download</button>
      </div>
    </div>
  </div>

  <!-- Progress Bar -->
  <div id="progressContainer">
    <div id="progressBar"><div id="progressFill"></div></div>
    <div id="progressText"></div>
  </div>

  <!-- Empty State -->
  <div id="emptyState">
    <div class="empty-icon">&#128247;</div>
    <div class="empty-text">No media found</div>
    <div class="empty-hint">Try scrolling the page and clicking Rescan, or adjust your filters.</div>
  </div>

  <!-- Image Grid -->
  <ul id="imageList"></ul>

  <!-- Drag Selection Box -->
  <div id="dragSelectBox"></div>

  <!-- Notification Toast -->
  <div id="notification"></div>
  <div id="floatingTooltip" role="tooltip"></div>

  <!-- Modal Image Editor -->
  <div id="imageModal">
    <button id="closeModal" aria-label="Close editor">&times;</button>

    <div id="modalImgContainer">
      <img id="modalImg" src="" alt="Image being edited">
    </div>

    <div id="processStatus">Ready to edit</div>

    <div id="modalToolbar">
      <div id="defaultTools">
        <div class="tool-row">
          <span style="color:#888; font-size:10px; text-transform:uppercase; font-weight:bold;">Manual:</span>
          <div class="tool-group">
            <button class="tool-btn" id="btnCrop" title="Crop edges by percentage">&#9986; Crop</button>
            <button class="tool-btn" id="btnResize" title="Scale image up or down">&#128201; Resize</button>
            <button class="tool-btn" id="btnFlip" title="Mirror image horizontally">&#8596; Flip</button>
            <button class="tool-btn" id="btnNoise" title="Add random grain/noise">&#9617; Noise</button>
            <button class="tool-btn" id="btnColor" title="Shift hue and saturation">&#127912; Color</button>
            <button class="tool-btn" id="btnObfuscate" title="Subtle blur + sharpen to alter pixels">&#128167; Obfuscate</button>
            <button class="tool-btn" id="btnRecompress" title="Re-encode as JPEG at given quality">&#128230; Re-JPEG</button>
          </div>
          <button class="tool-btn" id="btnRotate" title="Rotate 90 degrees clockwise">&#8635;</button>
        </div>

        <div class="tool-row" style="border-top:1px solid #444; padding-top:8px; margin-top:8px;">
          <div class="tool-group">
            <button class="tool-btn magic" id="btnMagic" title="Apply Crop+Resize+Noise+Color+Obfuscate+Recompress in sequence">&#9889; Magic Cascade</button>
            <button class="tool-btn" id="btnUndo" title="Undo last edit (Ctrl+Z)">&#8630; Undo <span id="undoCount">0</span></button>
            <button class="tool-btn danger" id="btnReset" title="Reset to original image">&#10005; Reset</button>
          </div>
          <div class="tool-group">
            <button class="tool-btn primary" id="btnCopyUrl" title="Copy current image URL to clipboard">&#128203; Copy URL</button>
            <button class="tool-btn success" id="btnDownloadSingle" title="Download the edited image">&#128190; Download Result</button>
          </div>
        </div>
      </div>

      <div id="activeToolPanel" style="display:none; align-items:center; justify-content:center; width:100%; height: 100%;">
        <div style="display:flex; align-items:center; gap:15px; background: #333; padding: 10px 20px; border-radius: 6px; border: 1px solid #555;">
          <div style="display:flex; align-items:center; gap:10px;">
            <span id="toolLabel" style="color:#fff; font-size:13px; font-weight:bold;">Setting:</span>
            <input type="number" id="toolInput" style="width:70px; padding:6px; border-radius:4px; border:1px solid #666; background:#222; color:white; font-weight:bold; text-align:center;">
            <span id="toolUnit" style="color:#aaa; font-size:12px;">%</span>
          </div>
          <div style="width: 1px; height: 25px; background: #555; margin: 0 5px;"></div>
          <div class="tool-group">
            <button class="tool-btn success" id="btnApplyTool">&#10004; Apply</button>
            <button class="tool-btn danger" id="btnCancelTool">&#10005; Cancel</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <canvas id="conversionCanvas" style="display:none;"></canvas>

  <script src="jszip.min.js"></script>
  <script src="utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
